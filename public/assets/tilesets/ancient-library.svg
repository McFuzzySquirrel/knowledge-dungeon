  <line x1="6" y1="8" x2="6" y2="24" stroke="#4a3a2a" stroke-width="0.5" opacity="0.15"/>
  <line x1="26" y1="8" x2="26" y2="24" stroke="#4a3a2a" stroke-width="0.5" opacity="0.15"/>
