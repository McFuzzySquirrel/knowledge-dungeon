  <line x1="24" y1="2" x2="24" y2="30" stroke="#2a2a4a" stroke-width="0.5" opacity="0.15"/>
  <rect x="14" y="8" width="4" height="6" rx="1" fill="#7be3ff" opacity="0.1" class="crystal"/>
