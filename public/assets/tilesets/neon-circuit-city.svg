<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .circuit { animation: circuitPulse 2s infinite alternate ease-in-out; }
    .circuit2 { animation: circuitPulse 1.5s infinite alternate-reverse ease-in-out; }
    @keyframes circuitPulse { from { opacity: 0.15; } to { opacity: 0.4; } }
  </style>
  <rect width="32" height="32" fill="#0a0a1a"/>
  <rect x="0" y="0" width="32" height="32" fill="#1a1a3a" opacity="0.1"/>
  <line x1="2" y1="8" x2="12" y2="8" stroke="#7be3ff" stroke-width="0.8" opacity="0.2" class="circuit"/>
  <line x1="12" y1="8" x2="12" y2="16" stroke="#7be3ff" stroke-width="0.6" opacity="0.15" class="circuit"/>
  <line x1="12" y1="16" x2="22" y2="16" stroke="#ffcf5f" stroke-width="0.8" opacity="0.2" class="circuit2"/>
  <line x1="22" y1="16" x2="22" y2="24" stroke="#ffcf5f" stroke-width="0.6" opacity="0.15" class="circuit2"/>
  <line x1="22" y1="24" x2="30" y2="24" stroke="#7be3ff" stroke-width="0.8" opacity="0.2" class="circuit"/>
  <circle cx="12" cy="8" r="2" fill="#7be3ff" opacity="0.15"/>
  <circle cx="22" cy="16" r="2" fill="#ffcf5f" opacity="0.15"/>
  <circle cx="12" cy="16" r="1" fill="#7be3ff" opacity="0.1"/>
  <circle cx="22" cy="24" r="1" fill="#7be3ff" opacity="0.1"/>
  <rect x="14" y="10" width="2" height="6" fill="#b48cff" opacity="0.08"/>
  <rect x="24" y="18" width="2" height="6" fill="#b48cff" opacity="0.08"/>
</svg>
