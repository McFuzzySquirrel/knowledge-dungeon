<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .vault-light { animation: vaultFlicker 2s infinite alternate ease-in-out; }
    @keyframes vaultFlicker { from { opacity: 0.1; } to { opacity: 0.25; } }
  </style>
  <rect width="32" height="32" fill="#1a1a1a"/>
  <rect x="0" y="0" width="32" height="32" fill="#2a2a2a" opacity="0.1"/>
  <rect x="2" y="2" width="28" height="28" rx="1" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.3"/>
  <rect x="6" y="6" width="20" height="20" rx="1" fill="none" stroke="#3a3a3a" stroke-width="0.3" opacity="0.2"/>
  <rect x="14" y="14" width="4" height="4" fill="#ffcf5f" opacity="0.08" class="vault-light"/>
  <circle cx="10" cy="10" r="1.5" fill="#4a4a4a" opacity="0.2"/>
  <circle cx="22" cy="22" r="1.5" fill="#4a4a4a" opacity="0.2"/>
  <circle cx="22" cy="10" r="1" fill="#4a4a4a" opacity="0.15"/>
  <circle cx="10" cy="22" r="1" fill="#4a4a4a" opacity="0.15"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="#3a3a3a" stroke-width="0.3" opacity="0.15"/>
</svg>
