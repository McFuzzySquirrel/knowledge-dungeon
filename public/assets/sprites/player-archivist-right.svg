<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <style>
    .outline { stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
    #leg { transform-origin: 72px 92px; animation: walk 0.5s infinite alternate ease-in-out; }
    #arm-far { transform-origin: 68px 60px; animation: swingFar 0.5s infinite alternate ease-in-out; }
    #arm-near { transform-origin: 78px 60px; animation: swingNear 0.5s infinite alternate ease-in-out; }
    #body { transform-origin: 72px 60px; animation: bounce 0.5s infinite alternate ease-in-out; }
    @keyframes walk { from { transform: translateX(3px) rotate(6deg); } to { transform: translateX(-3px) rotate(-6deg); } }
    @keyframes swingFar { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }
    @keyframes swingNear { from { transform: rotate(5deg); } to { transform: rotate(-5deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  </style>
  <ellipse cx="72" cy="112" rx="18" ry="7" fill="#00000033"/>
  <g id="body">
    <g id="leg">
      <rect x="66" y="78" width="14" height="24" rx="3" fill="#4a3728" class="outline"/>
      <rect x="64" y="100" width="18" height="8" rx="2" fill="#2f2f2f" class="outline"/>
    </g>
    <g id="torso">
      <path d="M64 48 L82 48 L84 84 L66 84 Z" fill="#5a3a7a" class="outline"/>
      <rect x="64" y="70" width="22" height="7" rx="2" fill="#8b6b2e" class="outline"/>
    </g>
    <g id="arm-far">
      <rect x="54" y="48" width="10" height="26" rx="4" fill="#4a2a6a" class="outline"/>
      <g id="book">
        <rect x="50" y="44" width="12" height="16" rx="2" fill="#8b4513" class="outline"/>
        <rect x="52" y="46" width="8" height="12" rx="1" fill="#d4c5a9"/>
      </g>
    </g>
    <g id="arm-near">
      <rect x="88" y="48" width="12" height="26" rx="4" fill="#5a3a7a" class="outline"/>
      <g id="quill">
        <rect x="97" y="34" width="2" height="24" fill="#d4c5a9" class="outline"/>
        <path d="M98 34 Q96 28 94 26 Q93 30 95 34 Z" fill="#d4c5a9" class="outline"/>
      </g>
    </g>
    <g id="head">
      <path d="M68 16 L68 50 C68 58 82 58 82 50 L82 36 C82 22 74 16 68 16 Z" fill="#2a1a4a" class="outline"/>
      <circle cx="76" cy="36" r="14" fill="#d9b08c" class="outline"/>
      <circle cx="82" cy="36" r="2" fill="#111"/>
      <path d="M74 42 Q76 44 78 42" stroke="#5a2d2d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="82" cy="36" r="5" fill="none" stroke="#c8a84e" stroke-width="1.2"/>
      <line x1="88" y1="36" x2="90" y2="36" stroke="#c8a84e" stroke-width="1.2"/>
    </g>
  </g>
</svg>
