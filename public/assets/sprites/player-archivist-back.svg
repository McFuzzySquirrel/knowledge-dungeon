<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <style>
    .outline { stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
    #left-leg { transform-origin: 52px 92px; animation: walkL 0.5s infinite alternate ease-in-out; }
    #right-leg { transform-origin: 76px 92px; animation: walkR 0.5s infinite alternate ease-in-out; }
    #body { transform-origin: 64px 60px; animation: bounce 0.5s infinite alternate ease-in-out; }
    @keyframes walkL { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }
    @keyframes walkR { from { transform: rotate(8deg); } to { transform: rotate(-8deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  </style>
  <ellipse cx="64" cy="112" rx="20" ry="8" fill="#00000033"/>
  <g id="body">
    <g id="left-leg">
      <rect x="48" y="78" width="12" height="26" rx="3" fill="#4a3728" class="outline"/>
      <rect x="46" y="102" width="16" height="7" rx="2" fill="#2f2f2f" class="outline"/>
    </g>
    <g id="right-leg">
      <rect x="68" y="78" width="12" height="26" rx="3" fill="#4a3728" class="outline"/>
      <rect x="66" y="102" width="16" height="7" rx="2" fill="#2f2f2f" class="outline"/>
    </g>
    <g id="torso">
      <path d="M44 42 L84 42 L90 84 L38 84 Z" fill="#4a2a6a" class="outline"/>
      <rect x="42" y="70" width="44" height="6" rx="2" fill="#7b5a2e" class="outline"/>
    </g>
    <g id="arms">
      <rect x="34" y="46" width="10" height="24" rx="4" fill="#4a2a6a" class="outline"/>
      <rect x="84" y="46" width="10" height="24" rx="4" fill="#4a2a6a" class="outline"/>
      <g id="book-back">
        <rect x="38" y="42" width="12" height="14" rx="2" fill="#7b3513" class="outline"/>
      </g>
      <g id="quill-back">
        <rect x="87" y="34" width="2" height="20" fill="#c4b599" class="outline"/>
        <path d="M86 34 Q84 28 87 26 Q88 28 88 34 Z" fill="#c4b599" class="outline"/>
      </g>
    </g>
    <g id="head">
      <ellipse cx="64" cy="32" rx="18" ry="22" fill="#1a0a3a" class="outline"/>
      <path d="M52 14 Q64 8 76 14" fill="#2a1a4a" class="outline"/>
      <path d="M48 32 Q50 28 54 30" stroke="#2a1a4a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M80 32 Q78 28 74 30" stroke="#2a1a4a" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
