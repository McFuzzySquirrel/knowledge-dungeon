<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <style>
    .outline { stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
    #left-leg { transform-origin: 50px 92px; animation: walkLeft 0.5s infinite alternate ease-in-out; }
    #right-leg { transform-origin: 78px 92px; animation: walkRight 0.5s infinite alternate ease-in-out; }
    #left-arm { transform-origin: 44px 62px; animation: armLeft 0.5s infinite alternate ease-in-out; }
    #right-arm { transform-origin: 84px 62px; animation: armRight 0.5s infinite alternate ease-in-out; }
    #body { transform-origin: 64px 60px; animation: breathe 2.5s infinite ease-in-out; }
    @keyframes walkLeft { from { transform: rotate(-10deg); } to { transform: rotate(10deg); } }
    @keyframes walkRight { from { transform: rotate(10deg); } to { transform: rotate(-10deg); } }
    @keyframes armLeft { from { transform: rotate(8deg); } to { transform: rotate(-8deg); } }
    @keyframes armRight { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }
    @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.008); } }
  </style>
  <ellipse cx="64" cy="112" rx="22" ry="8" fill="#00000033"/>
  <g id="body">
    <g id="legs">
      <g id="left-leg"><rect x="46" y="78" width="12" height="28" rx="3" fill="#4a3728" class="outline"/><rect x="44" y="102" width="16" height="8" rx="2" fill="#2f2f2f" class="outline"/></g>
      <g id="right-leg"><rect x="70" y="78" width="12" height="28" rx="3" fill="#4a3728" class="outline"/><rect x="68" y="102" width="16" height="8" rx="2" fill="#2f2f2f" class="outline"/></g>
    </g>
    <g id="torso">
      <path d="M44 42 L84 42 L92 82 L36 82 Z" fill="#2a6b4a" class="outline"/>
      <path d="M48 42 L80 42 L82 56 L46 56 Z" fill="#3a8b5a" class="outline"/>
      <rect x="40" y="68" width="48" height="8" rx="2" fill="#6b4a1e" class="outline"/>
    </g>
    <g id="arms">
      <g id="left-arm"><rect x="30" y="46" width="12" height="34" rx="4" fill="#2a6b4a" class="outline"/></g>
      <g id="right-arm">
        <rect x="86" y="46" width="12" height="34" rx="4" fill="#2a6b4a" class="outline"/>
        <g id="compass">
          <circle cx="95" cy="36" r="8" fill="#c8a84e" class="outline"/>
          <line x1="95" y1="30" x2="95" y2="42" stroke="#3a2a1a" stroke-width="1.5"/>
          <line x1="89" y1="36" x2="101" y2="36" stroke="#3a2a1a" stroke-width="1.5"/>
          <circle cx="95" cy="36" r="2" fill="#3a2a1a"/>
          <path d="M95 30 L93 34 L97 34 Z" fill="#c0392b"/>
        </g>
      </g>
    </g>
    <g id="head">
      <path d="M64 12 C48 12 38 24 38 40 L38 52 C38 58 90 58 90 52 L90 40 C90 24 80 12 64 12 Z" fill="#1a4a3a" class="outline"/>
      <ellipse cx="64" cy="38" rx="18" ry="18" fill="#d9b08c" class="outline"/>
      <circle cx="57" cy="38" r="2.5" fill="#111"/>
      <circle cx="71" cy="38" r="2.5" fill="#111"/>
      <path d="M58 47 Q64 51 70 47" stroke="#5a2d2d" stroke-width="2" fill="none" stroke-linecap="round"/>
      <g id="hood">
        <path d="M46 32 Q48 18 64 14 Q80 18 82 32 L80 36 Q72 30 64 28 Q56 30 48 36 Z" fill="#1a4a3a" opacity="0.6" class="outline"/>
        <path d="M46 32 L46 48" stroke="#1a4a3a" stroke-width="2"/>
        <path d="M82 32 L82 48" stroke="#1a4a3a" stroke-width="2"/>
      </g>
    </g>
  </g>
</svg>
