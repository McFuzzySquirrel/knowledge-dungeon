  <line x1="5" y1="10" x2="195" y2="10" stroke="#6B4914" stroke-width="2"/>
  <rect x="10" y="0" width="3" height="10" rx="1" fill="#6B4914"/>
  <rect x="50" y="0" width="3" height="10" rx="1" fill="#6B4914"/>
  <rect x="100" y="0" width="3" height="10" rx="1" fill="#6B4914"/>
  <rect x="150" y="0" width="3" height="10" rx="1" fill="#6B4914"/>
  <rect x="187" y="0" width="3" height="10" rx="1" fill="#6B4914"/>
</svg>
