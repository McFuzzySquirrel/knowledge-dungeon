<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Pier platform -->
  <rect x="0" y="10" width="200" height="15" rx="2" fill="#8B6914"/>
  <rect x="0" y="10" width="200" height="3" fill="#a08020" opacity="0.5"/>
  <!-- Plank lines -->
  <line x1="40" y1="10" x2="40" y2="25" stroke="#6B4914" stroke-width="1"/>
  <line x1="80" y1="10" x2="80" y2="25" stroke="#6B4914" stroke-width="1"/>
  <line x1="120" y1="10" x2="120" y2="25" stroke="#6B4914" stroke-width="1"/>
  <line x1="160" y1="10" x2="160" y2="25" stroke="#6B4914" stroke-width="1"/>
  <!-- Support posts -->
  <rect x="15" y="25" width="6" height="35" rx="1" fill="#5a3a1a"/>
