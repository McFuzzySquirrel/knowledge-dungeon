<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Pile of three scrolls bound with ribbons -->
  <ellipse cx="12" cy="20" rx="9" ry="2" fill="#1c1108" opacity="0.55"/>
  <!-- back scroll (rolled) -->
  <rect x="4" y="12" width="16" height="5" rx="2.5" fill="#e8d8b5" stroke="#3a2814" stroke-width="0.8"/>
  <circle cx="4" cy="14.5" r="2.4" fill="#c8b48a" stroke="#3a2814" stroke-width="0.8"/>
  <circle cx="20" cy="14.5" r="2.4" fill="#c8b48a" stroke="#3a2814" stroke-width="0.8"/>
  <rect x="11" y="11.5" width="2" height="6" fill="#a33a2a"/>
  <!-- middle scroll, slightly above -->
  <rect x="6" y="7" width="12" height="4.5" rx="2.2" fill="#f0e1be" stroke="#3a2814" stroke-width="0.8"/>
  <circle cx="6" cy="9.2" r="2.1" fill="#d4c194" stroke="#3a2814" stroke-width="0.8"/>
  <circle cx="18" cy="9.2" r="2.1" fill="#d4c194" stroke="#3a2814" stroke-width="0.8"/>
  <rect x="11.4" y="6.5" width="1.6" height="5.5" fill="#3a6a8a"/>
  <!-- small open scroll on top -->
  <path d="M9 5 L15 5 L15 7.5 L9 7.5 Z" fill="#fff2d0" stroke="#3a2814" stroke-width="0.6"/>
  <path d="M10 6 H14 M10 6.8 H13.5" stroke="#5a4028" stroke-width="0.4"/>
</svg>
