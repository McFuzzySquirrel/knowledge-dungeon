<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Doorframe stone arch -->
  <rect x="4" y="6" width="24" height="22" fill="#2b1a0a" opacity="0.95"/>
  <rect x="4" y="6" width="24" height="22" fill="none" stroke="#7a5a30" stroke-width="2"/>
  <!-- Door panel -->
  <rect x="8" y="9" width="16" height="19" fill="#6b4a24" opacity="1"/>
  <rect x="8" y="9" width="16" height="19" fill="none" stroke="#3d2a14" stroke-width="1.5"/>
  <!-- Vertical planks -->
  <line x1="13" y1="9" x2="13" y2="28" stroke="#3d2a14" stroke-width="0.8" opacity="0.7"/>
  <line x1="19" y1="9" x2="19" y2="28" stroke="#3d2a14" stroke-width="0.8" opacity="0.7"/>
  <!-- Cross beams -->
  <rect x="8" y="13" width="16" height="2" fill="#3d2a14" opacity="0.55"/>
  <rect x="8" y="22" width="16" height="2" fill="#3d2a14" opacity="0.55"/>
  <!-- Iron handle -->
  <circle cx="21" cy="19" r="1.4" fill="#cfb37a"/>
  <circle cx="21" cy="19" r="0.6" fill="#2a1a0a"/>
  <!-- Highlight -->
  <rect x="9" y="10" width="2" height="17" fill="#a47a3e" opacity="0.35"/>
</svg>
