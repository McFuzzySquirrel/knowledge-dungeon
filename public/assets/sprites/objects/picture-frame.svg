  <circle cx="17" cy="9.5" r="2.2" fill="#f0c040" opacity="0.8"/>
  <!-- Frame corner highlights -->
  <rect x="1.5" y="2.5" width="3.5" height="3.5" rx="0.5" fill="#c8921a" opacity="0.55"/>
  <rect x="19" y="2.5" width="3.5" height="3.5" rx="0.5" fill="#c8921a" opacity="0.55"/>
  <rect x="1.5" y="18" width="3.5" height="3.5" rx="0.5" fill="#c8921a" opacity="0.55"/>
  <rect x="19" y="18" width="3.5" height="3.5" rx="0.5" fill="#c8921a" opacity="0.55"/>
</svg>
