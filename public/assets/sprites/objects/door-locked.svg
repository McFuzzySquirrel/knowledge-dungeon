    <rect x="20" y="12" width="8" height="10" rx="2" fill="#c8a84e" stroke="#3a2a16" stroke-width="1.5"/>
    <path d="M22 12 L22 9 Q22 6 24 6 Q26 6 26 9 L26 12" fill="none" stroke="#c8a84e" stroke-width="2"/>
    <circle cx="24" cy="18" r="1.5" fill="#3a2a16"/>
