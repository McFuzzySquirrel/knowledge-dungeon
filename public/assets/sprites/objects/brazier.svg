<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .flame1 { animation: flicker1 0.8s infinite alternate ease-in-out; transform-origin: 16px 10px; }
    .flame2 { animation: flicker2 1.2s infinite alternate ease-in-out; transform-origin: 16px 12px; }
    .flame3 { animation: flicker3 0.6s infinite alternate ease-in-out; transform-origin: 16px 11px; }
    .glow { animation: glowPulse 1.5s infinite alternate ease-in-out; }
    @keyframes flicker1 { from { transform: scaleY(0.9) translateX(-1px); } to { transform: scaleY(1.1) translateX(1px); } }
    @keyframes flicker2 { from { transform: scaleY(0.85) translateX(1px); } to { transform: scaleY(1.15) translateX(-1px); } }
    @keyframes flicker3 { from { opacity: 0.7; } to { opacity: 1; } }
    @keyframes glowPulse { from { opacity: 0.3; } to { opacity: 0.6; } }
  </style>
  <ellipse cx="16" cy="28" rx="10" ry="3" fill="#1c1108" opacity="0.6"/>
  <path d="M6 24 L9 16 L23 16 L26 24 Z" fill="#5a4028" stroke="#2a1d10" stroke-width="1"/>
  <rect x="8" y="15.5" width="16" height="2" rx="0.5" fill="#7a5a32" stroke="#2a1d10" stroke-width="0.6"/>
  <circle cx="16" cy="18" r="8" fill="#ff7a1a" opacity="0.15" class="glow"/>
  <path class="flame1" d="M10 16 Q12 8 14 14 Q16 6 18 14 Q22 10 22 16 Z" fill="#f2c879" opacity="0.9"/>
  <path class="flame2" d="M12 16 Q13 10 15 14 Q17 8 19 14 Q20 12 20 16 Z" fill="#ff9b3a" opacity="0.85"/>
  <path class="flame3" d="M14 16 Q15 12 16 13 Q17 10 18 15 Q18 16 16 16 Q15 16 14 16 Z" fill="#fff2c2" opacity="0.9"/>
</svg>
