  <circle cx="16" cy="18" r="10" fill="#ff7a1a" opacity="0.12" class="glow"/>
  <path class="flame1" d="M10 16 Q12 6 14 14 Q16 4 18 14 Q22 8 22 16 Z" fill="#f2c879" opacity="0.9"/>
  <path class="flame2" d="M12 16 Q13 9 15 14 Q17 6 19 14 Q20 11 20 16 Z" fill="#ff9b3a" opacity="0.85"/>
  <path d="M14 16 Q15 11 16 13 Q17 9 18 15 Q18 16 16 16 Q15 16 14 16 Z" fill="#fff2c2" opacity="0.9"/>
</svg>
