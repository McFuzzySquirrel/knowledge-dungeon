<svg width="32" height="64" viewBox="0 0 32 64" xmlns="http://www.w3.org/2000/svg">
  <style>
    .flame1 { animation: flicker1 0.6s infinite alternate ease-in-out; transform-origin: 16px 14px; }
    .flame2 { animation: flicker2 0.8s infinite alternate ease-in-out; transform-origin: 16px 16px; }
    .glow { animation: glowPulse 1.5s infinite alternate ease-in-out; }
    @keyframes flicker1 { from { transform: scaleY(0.9) translateX(-1px); } to { transform: scaleY(1.1) translateX(1px); } }
    @keyframes flicker2 { from { transform: scaleY(0.85) translateX(1px); } to { transform: scaleY(1.15) translateX(-1px); } }
    @keyframes glowPulse { from { opacity: 0.2; } to { opacity: 0.5; } }
  </style>
  <rect x="13" y="28" width="6" height="32" rx="2" fill="#3a2a1a"/>
  <rect x="6" y="24" width="20" height="6" rx="2" fill="#5a3a1a"/>
