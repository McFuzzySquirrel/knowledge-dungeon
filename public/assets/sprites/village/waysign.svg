<svg width="80" height="120" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .arm1 { animation: sway1 3s infinite ease-in-out; transform-origin: 40px 80px; }
    .arm2 { animation: sway2 3.5s infinite ease-in-out; transform-origin: 40px 80px; }
    .arm3 { animation: sway3 2.8s infinite ease-in-out; transform-origin: 40px 80px; }
    @keyframes sway1 { 0%,100% { transform: rotate(-0.5deg); } 50% { transform: rotate(0.5deg); } }
    @keyframes sway2 { 0%,100% { transform: rotate(0.3deg); } 50% { transform: rotate(-0.3deg); } }
    @keyframes sway3 { 0%,100% { transform: rotate(-0.3deg); } 50% { transform: rotate(0.3deg); } }
  </style>
  <ellipse cx="40" cy="112" rx="14" ry="4" fill="rgba(0,0,0,0.2)"/>
  <rect x="37" y="20" width="6" height="88" rx="2" fill="#5a3a1e"/>
  <!-- Arm pointing right (→) -->
  <g class="arm1">
    <rect x="43" y="30" width="28" height="6" rx="2" fill="#6b4a2a" stroke="#2b1a0d" stroke-width="1"/>
    <polygon points="71,33 78,36 71,39" fill="#6b4a2a"/>
  </g>
  <!-- Arm pointing up-right (↗) -->
  <g class="arm2">
    <rect x="30" y="18" width="6" height="24" rx="2" fill="#6b4a2a" stroke="#2b1a0d" stroke-width="1"/>
    <rect x="36" y="24" width="18" height="6" rx="2" fill="#6b4a2a" stroke="#2b1a0d" stroke-width="1"/>
    <polygon points="54,27 60,24 54,21" fill="#6b4a2a"/>
  </g>
  <!-- Arm pointing down (↓) -->
  <g class="arm3">
    <rect x="18" y="42" width="6" height="22" rx="2" fill="#6b4a2a" stroke="#2b1a0d" stroke-width="1"/>
    <rect x="10" y="48" width="18" height="6" rx="2" fill="#6b4a2a" stroke="#2b1a0d" stroke-width="1"/>
    <polygon points="10,51 14,57 18,51" fill="#6b4a2a"/>
  </g>
</svg>
