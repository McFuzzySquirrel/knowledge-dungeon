<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <style>
    .outline { stroke: #1a1a1a; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
    #leg { transform-origin: 56px 92px; animation: walk 0.5s infinite alternate ease-in-out; }
    #arm-far { transform-origin: 60px 60px; animation: swingFar 0.5s infinite alternate ease-in-out; }
    #arm-near { transform-origin: 50px 60px; animation: swingNear 0.5s infinite alternate ease-in-out; }
    #body { transform-origin: 56px 60px; animation: bounce 0.5s infinite alternate ease-in-out; }
    @keyframes walk { from { transform: translateX(-3px) rotate(-6deg); } to { transform: translateX(3px) rotate(6deg); } }
    @keyframes swingFar { from { transform: rotate(5deg); } to { transform: rotate(-5deg); } }
    @keyframes swingNear { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
  </style>
  <ellipse cx="56" cy="112" rx="18" ry="7" fill="#00000033"/>
  <g id="body">
    <g id="leg">
      <rect x="48" y="78" width="14" height="24" rx="3" fill="#4a3728" class="outline"/>
      <rect x="46" y="100" width="18" height="8" rx="2" fill="#2f2f2f" class="outline"/>
    </g>
    <g id="torso">
      <path d="M46 48 L64 48 L62 84 L44 84 Z" fill="#5a3a7a" class="outline"/>
      <rect x="42" y="70" width="22" height="7" rx="2" fill="#8b6b2e" class="outline"/>
    </g>
    <g id="arm-far">
      <rect x="64" y="48" width="10" height="26" rx="4" fill="#4a2a6a" class="outline"/>
      <g id="quill">
        <rect x="72" y="34" width="2" height="24" fill="#d4c5a9" class="outline"/>
        <path d="M71 34 Q73 28 75 26 Q76 30 74 34 Z" fill="#d4c5a9" class="outline"/>
      </g>
    </g>
    <g id="arm-near">
      <rect x="28" y="48" width="12" height="26" rx="4" fill="#5a3a7a" class="outline"/>
      <g id="book">
        <rect x="20" y="44" width="14" height="16" rx="2" fill="#8b4513" class="outline"/>
        <rect x="22" y="46" width="10" height="12" rx="1" fill="#d4c5a9"/>
        <line x1="24" y1="48" x2="30" y2="48" stroke="#8b4513" stroke-width="0.8"/>
        <line x1="24" y1="51" x2="30" y2="51" stroke="#8b4513" stroke-width="0.8"/>
      </g>
    </g>
    <g id="head">
      <path d="M60 16 L60 50 C60 58 46 58 46 50 L46 36 C46 22 54 16 60 16 Z" fill="#2a1a4a" class="outline"/>
      <circle cx="52" cy="36" r="14" fill="#d9b08c" class="outline"/>
      <circle cx="46" cy="36" r="2" fill="#111"/>
      <path d="M50 42 Q52 44 54 42" stroke="#5a2d2d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="46" cy="36" r="5" fill="none" stroke="#c8a84e" stroke-width="1.2"/>
      <line x1="40" y1="36" x2="38" y2="36" stroke="#c8a84e" stroke-width="1.2"/>
    </g>
  </g>
</svg>
